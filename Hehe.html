<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 8th Monthsary 🌸</title>
<style>
body{margin:0;font-family:Poppins,Arial;background:#0f172a;color:#fff;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:.8s}
.hidden{opacity:0;pointer-events:none;transform:scale(1.05)}

/* FLOWER */
.flower-wrap{cursor:pointer;text-align:center}
svg{width:180px;height:180px}
.petal{fill:#e63946;opacity:0;transform-origin:center;transform:scale(0);animation:bloom 1s forwards}
.petal:nth-child(1){animation-delay:.1s}
.petal:nth-child(2){animation-delay:.2s}
.petal:nth-child(3){animation-delay:.3s}
.petal:nth-child(4){animation-delay:.4s}
.petal:nth-child(5){animation-delay:.5s}
.center{fill:#ffd166;opacity:0;animation:fadeIn .8s .6s forwards}
@keyframes bloom{to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{to{opacity:1}}

/* FALLING PETALS */
.petal-fall{position:fixed;top:-20px;width:15px;height:15px;background:#ff6b81;border-radius:50%;opacity:0.7;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg);opacity:0}}

/* CAROUSEL */
.carousel{width:260px;height:260px;perspective:1000px}
.ring{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:spin 12s linear infinite}
.ring:hover{animation-play-state:paused}
.ring img{position:absolute;width:200px;height:200px;left:30px;top:30px;border-radius:20px;object-fit:cover;box-shadow:0 10px 25px rgba(0,0,0,.6);cursor:pointer}
.ring img:nth-child(1){transform:rotateY(0deg) translateZ(300px)}
.ring img:nth-child(2){transform:rotateY(60deg) translateZ(300px)}
.ring img:nth-child(3){transform:rotateY(120deg) translateZ(300px)}
.ring img:nth-child(4){transform:rotateY(180deg) translateZ(300px)}
.ring img:nth-child(5){transform:rotateY(240deg) translateZ(300px)}
.ring img:nth-child(6){transform:rotateY(300deg) translateZ(300px)}
@keyframes spin{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}

/* POPUP */
.popup{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.popup.active{opacity:1;pointer-events:auto}
.popup-box{background:#1e293b;padding:20px;border-radius:15px;max-width:300px;text-align:center}

.message{max-width:600px;text-align:center;line-height:1.6;font-size:1.2em;padding:20px}
button{margin-top:20px;padding:10px 18px;border:none;border-radius:25px;background:#ff4b5c;color:#fff;cursor:pointer}
</style>
</head>
<body>

<!-- INTRO -->
<div class="screen" id="intro">
  <div class="flower-wrap" onclick="goGallery()">
    <svg viewBox="0 0 200 200">
      <ellipse class="petal" cx="100" cy="60" rx="30" ry="50"/>
      <ellipse class="petal" cx="140" cy="100" rx="50" ry="30"/>
      <ellipse class="petal" cx="100" cy="140" rx="30" ry="50"/>
      <ellipse class="petal" cx="60" cy="100" rx="50" ry="30"/>
      <ellipse class="petal" cx="100" cy="100" rx="40" ry="40"/>
      <circle class="center" cx="100" cy="100" r="15"/>
    </svg>
    <p>For you 🌸</p>
  </div>
</div>

<!-- GALLERY -->
<div class="screen hidden" id="gallery">
  <h2>Our Memories 💖</h2>
  <div class="carousel">
    <div class="ring">
      <img src="1.png.jpeg" onclick="openMsg('This was one of my favorite memories ❤️')">
      <img src="2.png.jpeg" onclick="openMsg('I still remember this 💕')">
      <img src="3.png.jpeg" onclick="openMsg('You looked so cute here ')">
      <img src="4.png.jpeg" onclick="openMsg('One of our happiest moments')">
      <img src="5.png.jpeg" onclick="openMsg('I miss this day')">
      <img src="6.png.jpeg" onclick="openMsg('More memories to come 💖')">
    </div>
  </div>
  <button onclick="goFinal()">Next 💌</button>
</div>

<!-- FINAL -->
<div class="screen hidden" id="final">
  <h1>Happy 8th Monthsary ❤️</h1>
  <p id="counter"></p>
  <div class="message" id="typeText"></div>
  <button onclick="alert('I love you so much ❤️')">One last thing…</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closeMsg()">
  <div class="popup-box" id="popupText"></div>
</div>

<audio id="bgMusic" loop>
  <source src="Rob Deniel - Sinta (Official Lyric Visualizer).mp3" type="audio/mp3">
</audio>

<script>
function goGallery(){
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('gallery').classList.remove('hidden');

  const music = document.getElementById('bgMusic');
  music.volume = 0;
  music.play();

  let fade = setInterval(()=>{
    if(music.volume < 1){
      music.volume += 0.05;
    } else { clearInterval(fade); }
  },200);

  // falling petals
  for(let i=0;i<20;i++){
    let petal=document.createElement('div');
    petal.className='petal-fall';
    petal.style.left=Math.random()*100+'vw';
    petal.style.animationDuration=(2+Math.random()*3)+'s';
    document.body.appendChild(petal);
    setTimeout(()=>petal.remove(),5000);
  }
}

function goFinal(){
  document.getElementById('gallery').classList.add('hidden');
  document.getElementById('final').classList.remove('hidden');
  typeWriter();
}

function openMsg(text){
  document.getElementById('popup').classList.add('active');
  document.getElementById('popupText').innerText=text;
}
function closeMsg(){
  document.getElementById('popup').classList.remove('active');
}

// typing effect
const text="8 months with you feels like the best thing that ever happened to me. Every moment with you is special, and I can't wait for more memories. I'll always choose you. 💕";
let i=0;
function typeWriter(){
  if(i<text.length){
    document.getElementById('typeText').innerHTML+=text.charAt(i);
    i++;
    setTimeout(typeWriter,40);
  }
}

// day counter
const startDate=new Date("2025-09-06");
const today=new Date();
const days=Math.floor((today-startDate)/(1000*60*60*24));
document.getElementById('counter').innerText=days+" days with you 💕";
</script>

</body>
</html>
